{% extends "base.html" %} {% block body %}
<div class="commentPage">
  <div class="ideaHeader">
    <h2>{{ idea.title }}</h2>
    <p>{{ idea.description }}</p>
  </div>

  <div class="commentsHeading"><h3>Comments</h3></div>

  {% if comments %} {% for comment in comments %}
  <div class="commentBubble">
    <p>{{ comment.content }}</p>
  </div>
  {% endfor %} {% else %}
  <div class="noComments">No comments yet — be the first.</div>
  {% endif %}

  <form class="commentForm" action="/comment/{{ idea.id }}" method="POST">
    <label class="formLabel">Leave a comment</label>
    <textarea name="content" placeholder="Share your thoughts..."></textarea>
    <button type="submit">Add Comment</button>
  </form>
</div>
{% endblock %}
